<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Pasindu Udawatta</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1a1a2e;
            --secondary-dark: #16213e;
            --accent-gold: #e4a853;
            --accent-teal: #4a9d9c;
            --text-light: #f4f4f4;
            --text-muted: #b8b8b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: var(--primary-dark);
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        /* Background Decoration */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-gold);
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-teal);
            bottom: -50px;
            left: -50px;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Navigation */
        nav {
            position: relative;
            z-index: 100;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--accent-gold);
        }

        .mobile-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .mobile-menu span {
            width: 25px;
            height: 2px;
            background: var(--text-light);
            transition: all 0.3s ease;
        }

        /* Hero Section */
        .hero {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
        }

        .hero-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            align-items: center;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Profile Photo */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .profile-photo-container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-gold);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .profile-photo:hover {
            transform: scale(1.05);
            box-shadow: 0 25px 70px rgba(228, 168, 83, 0.3);
        }

        /* Placeholder for photo */
        .profile-photo-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(228, 168, 83, 0.2), rgba(74, 157, 156, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            border: 4px solid var(--accent-gold);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .profile-contact {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.5rem;
            background: rgba(228, 168, 83, 0.1);
            border: 1px solid rgba(228, 168, 83, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            background: rgba(228, 168, 83, 0.15);
            border-color: rgba(228, 168, 83, 0.4);
            transform: translateX(5px);
        }

        .contact-icon {
            font-size: 1.3rem;
            color: var(--accent-gold);
        }

        .contact-text {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .contact-item a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-item a:hover {
            color: var(--accent-gold);
        }

        /* Hero Content */
        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .hero-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--accent-teal);
            font-weight: 500;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .hero-bio {
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 1.05rem;
            margin-bottom: 1rem;
        }

        .hero-highlights {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .highlight-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .highlight-icon {
            font-size: 1.5rem;
        }

        .highlight-text {
            display: flex;
            flex-direction: column;
        }

        .highlight-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight-value {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--primary-dark);
        }

        .btn-primary:hover {
            background: var(--accent-teal);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(228, 168, 83, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(228, 168, 83, 0.3);
            color: var(--text-light);
        }

        .btn-secondary:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(228, 168, 83, 0.1);
        }

        /* Social Links */
        .social-links {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(228, 168, 83, 0.2);
        }

        .social-links-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(228, 168, 83, 0.1);
            border: 1px solid rgba(228, 168, 83, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .social-link:hover {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(228, 168, 83, 0.3);
        }

        .social-link::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: var(--text-light);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            --card-bg: #242438;
        }

        .social-link:hover::after {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 3rem;
                text-align: center;
            }

            .profile-section {
                order: 1;
            }

            .hero-content {
                order: 2;
            }

            .cta-buttons,
            .social-icons {
                justify-content: center;
            }

            .profile-contact {
                max-width: 400px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .hero-container {
                gap: 2rem;
            }

            .profile-photo-container {
                width: 220px;
                height: 220px;
            }

            .hero-highlights {
                justify-content: center;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .profile-photo-container {
                width: 180px;
                height: 180px;
            }

            .highlight-item {
                width: 100%;
                justify-content: center;
            }
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 5%;
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 70%;
                height: 100vh;
                background: var(--secondary-dark);
                flex-direction: column;
                padding: 5rem 2rem;
                gap: 2rem;
                transition: left 0.3s ease;
                box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
            }

            .nav-links.active {
                left: 0;
            }

            .mobile-menu {
                display: flex;
                z-index: 1000;
            }

            .cta-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<script>
    function toggleMenu() {
        const navLinks = document.querySelector('.nav-links');
        const mobileMenu = document.querySelector('.mobile-menu');
        navLinks.classList.toggle('active');

        const spans = mobileMenu.querySelectorAll('span');
        if (navLinks.classList.contains('active')) {
            spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
            spans[1].style.opacity = '0';
            spans[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
        } else {
            spans[0].style.transform = 'none';
            spans[1].style.opacity = '1';
            spans[2].style.transform = 'none';
        }
    }

    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        });
    });
</script>
